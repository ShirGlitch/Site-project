<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AniList-IL - התחברות</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header id="main-header"></header>

    <script src="script.js"></script>

<!-- האזור העליון של האתר - header -->

    <main class="auth-page-main">
        <section class="auth-container">
            <div class="auth-header">
                <h2>ברוכים הבאים</h2>
            </div>
        <p>התחברו באמצעות חשבון הגוגל שלכם כדי להתחיל לנהל את רשימות הצפייה</p>
        
            <button class="google-btn" id="google-login-btn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google Logo">
                <span>התחברות עם Google</span>
            </button>
            
            <div class="auth-footer">
                <small>בלחיצה על התחברות, הנך מסכים לתנאי השימוש באתר.</small>
            </div>
        </section>
    </main>

</body>
</html>
